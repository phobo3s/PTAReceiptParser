# stores.toml — Market parse profilleri + evrensel kurallar
#
# [common]          Tüm marketlere uygulanan evrensel kurallar
# [store.xxx]       Market-spesifik profil
#
# Her store için alanlar:
#   name            Okunabilir market adı
#   identifiers     Header'da aranacak regex listesi (case-insensitive)
#   y_tolerance     Aynı satıra gruplamak için piksel toleransı
#   header_y_max    Bu Y altından itibaren ürünler başlar
#   footer_y_min    Bu Y'den sonrası footer (toplam/KDV/banka)
#   price_pattern   Fiyat tespiti için regex
#   total_pattern   Toplam satırı tespiti için regex
#   skip_patterns   Bu market için ek skip satırları (common'a eklenir)
#   name_cleanup    Bu market için ek temizleme çiftleri (common'a eklenir)
#   parse_mode      "normal" | "two_line"  (varsayılan: "normal")
#                   two_line: 1. satır isim, 2. satırın sonu fiyat (Metro gibi)

# ── Evrensel kurallar ─────────────────────────────────────────────────────────
[common]

# Tüm marketlerde skip edilecek satır desenleri
skip_patterns = [
    '^TCKN',
    '^ETTN',
    '^FATURA',
    '^E-Arsiv',
    '^Sira No',
    '^Buyuk Mukellef',
    '^\d{15,}$',                           # barkod numaraları
    '^TOPLAM\s*K[OD]V',                    # KDV özeti, asıl toplam değil
    '^Odenecek',
    '^Banka',
    '^GARANTI',
    '^Onay',
    '^Ref\.No',
    '^KDV\s+(MATRAH|TUTAR|DAHIL)',
    '^(KDV|MATRAH|KOV TUTAR|KOV DAH)',
    'TOPK[DO][VU]',
    '^POS:',
    '^GS No',
    '^\d{2}\.\d{2}\.\d{4}',               # tarih satırları (ödeme bölümü)
    '^#+\s',                               # ## BarkoPOS gibi POS sistem satırları
    '^[BI]:[\d]+',                         # B:706 S:9638 gibi
    '^\d{4,6}\*+\d{4}$',                  # kart numarası
    '^\*{5,}',                             # ****2911 tipi — POS kart son4
    '^\*{3,}\d{1,4}$',                    # ***2911 varyantı
    '^%[\s\d]+\s*$',                       # %1, %20, % 2 0 gibi KDV kodu satırları
    '^\$\d*\.?$',                          # $0. — mobile OCR gürültüsü
    '^[\$各\\]',                           # 各1 $c}$ gibi saçma karakterler
    '^\d+\.$',                             # sadece "1."
    # NOT: '^\d+[\.,]\d{2}$' common'dan çıkarıldı — star-prefix kullanan
    # marketlerin kendi skip_patterns'ına eklendi. Yıldızsız fiyat kullanan
    # marketler (PAVO, FULL OTO) için bu pattern sorun çıkarıyordu.
    '^\d+[\.,]\d{2}\s+\d+[\.,]\d{2}',    # KDV tablo satırı (iki sütun)
    '^\([\d）]+\)$',
    '^AFATOPLAM',                          # Ara toplam (Tankar)
    '^ARATOPLAM',
    '^ARATOPLAN',                          # OCR varyantı
    '^APATOPLAM',                          # Restoran fişi (Denizkent vb.)
    '^TOP(LAH|PLAH)?$',                    # Sadece "TOP" / "TOPLAH" label'ı
    '^JOPLAM',                             # OCR hatası: "TOPLAM" → "JOPLAM"
    '^KDV$',
    '^SN:',
    '^EFT-[PF]OS',                         # ödeme yöntemi satırı
    '^Nakit\b',
    '^Kredi\s+Kartı\b',
    '^BROT\s+GIDA',                        # gıda-dışı KDV özet satırı
    '^BRUT\s+GIDA',                        # Brut gıda satırı (METRO e-Fatura)
    '^(NET|ODEME|ÖDEM|ÖDEME)\s+TUTARI',
    '^\d{3}\s+\d+[\.,]\d{2}',             # Ödeme kodu + tutar: "020 71.50"
    # METRO e-Fatura / genel fatura başlık satırları
    '^MERKEZ:',
    '^OLUŞTURMA\s+TARİHİ',
    '^FİİLİ\s+SEVK\s+TARİHİ',
    '^METRO\s+FATURA\s+NO',
    '^İŞLEM\s+NO',
    '^KASİYER\s+NO',
    '^MÜŞTERI\s+NO',
    '^VKN',
    '^D\d+\s+[A-Z]',                       # METRO barkod+ürün: D123456 XYZ
    '^[0-9]{8,}[A-Z]',                     # barkod+harf karması
    # İletişim / web satırları
    '^TEL[:\s：]',
    '^FAX[:\s：]',
    '^www\.',
    '^ww\.',
    # Kart / ödeme detay satırları
    '^KREDI\s+KARTI',
    '^KART\s+NO',
    '^RRN:',
    '^ACQUİRER',
    '^TUTAR\s+KARŞILAŞTIRI',
    '^HİZMET\s+ALINDI',
    '^BU\s+BEL',
    '^Toplam Koli Mik\.:',
    '^ARA TOPLAM',
]

# Fiyat satırlarında para birimi sembollerini normalleştir
price_prefix_cleanup = [
    ['[￥¥$§¢€£₹₽=]', '*'],    # OCR garip para birimi → *
    ['%[0-9A-Fa-f]{2}', ' '],   # URL encoding: %20 → boşluk
]

# Tüm marketlerde uygulanan ürün adı temizleme (lambda'sız, sözlük ayrıca gelecek)
name_cleanup = [
    ['[一-鿿㐀-䶿]+', ''],            # Çince karakter temizliği
    ['\s{2,}', ' '],                                    # çift boşluk → tek boşluk
    ['(?<=[A-ZÇĞŞÜÖİ])0(?=[A-ZÇĞŞÜÖİ])', 'O'],  # T0ZU → TOZU (0 ile O karışımı)
]

# Tarih tespiti için regex desenleri
date_patterns = [
    '^.*:?(\d{2}([\.\-\/\\])\d{2}\2\d{4})(\s*\d{2}:\d{2})?',   # 31.12.2026, 31-12-2026
    '^.*?([01]\d{1}\.(20)\d{4})\b',                               # 31.122026 (delimiter yok)
    '(\d{2})([\.\-]?)(\d{2})\2(\d{4})',                           # Boşluklu: "31 . 12 . 2026"
    '^.*?(\d{2}([\.\-\/])\d{2}\2\d{2})\b',                       # 18/04/26 — 2 haneli yıl
    '(\d{2}-\d{2}\s+\d{4})',                                      # 02-06 2026 (boşluklu yıl)
]

# ── BİM ───────────────────────────────────────────────────────────────────────
[store.bim]
name = "BİM"
identifiers = [
    'BIM BIRLESIK',
    'BİM BİRLEŞİK',
    'BiM\s+Bi[Rr]',
    'SIM BIRLESIK',
    'BIM A\.S',
]
y_tolerance   = 20
header_y_max  = 640
footer_y_min  = 9999
price_pattern = '^\*(\d+[\.,]\d{2})$'
total_pattern = '^(Odenecek K[OD]V Dahil|TOPLAM(?!\s*K[OD]V)|KRED[iİI] KARTI)'
skip_patterns = [
    '^\d+[\.,]\d{2}$',   # KDV tablo satırları (yıldızsız tek sayı)
]
name_cleanup = [
    ['^[=\-]+\s*', ''],
    ['\s*(?:\d+%|[\$%°]\d*\.?)\s*$', ''],
    ['\s+\$\\.*?\$\s*$', ''],
    ['\s+\\?\d+\.\s*$', ''],
    ['^(\d+[\.,]\d+)\s*kg\s*[Xx×]\s*(\d+[\.,]\d+)\s+', '(\1kg × \2) '],
]
parse_mode = "normal"

# ── Migros / Market ───────────────────────────────────────────────────────────
[store.migros]
name = "Migros / Market"
identifiers = [
    'MIGROS',
    'MİGROS',
    'HAKAN KARACA',
    'CAN MARKET',
    'DUFREL',
    'GIDA\s+SAN',
]
y_tolerance   = 15
header_y_max  = 900
footer_y_min  = 9999
price_pattern = '^[\*x×](-?[\d]+\.[\d]+,\d{2}|-?[\d\.]+,\d{2}|-?[\d]+[\.,]\d{2}|-?[\d]{3,})$'
total_pattern = '^TOPLAM|^EFT-[PF]OS'
skip_patterns = [
    '^KOV\s+Z',       # KOV Z20 metadata
    '^\d+[\.,]\d{2}$',
]
name_cleanup = [
    ['^[=\-]+\s*', ''],
    ['\s*(?:\d+%|%\d+)\s*$', ''],
]
parse_mode = "normal"

# ── Tankar / Akaryakıt ────────────────────────────────────────────────────────
[store.tankar]
name = "Tankar"
identifiers = [
    'TANKAR',
    'TANKRR',
    '\bANKAR\b',
]
y_tolerance   = 20
header_y_max  = 330
footer_y_min  = 9999
price_pattern = '^.*\*([\d\.]+,\d{2}|[\d]+[\.,]\d{2}|[\d]{3,})$'
total_pattern = '^TOPLAM|^TOP|^K.KARTI|^EFT-[PF]OS'
skip_patterns = [
    '^\d+[\.,]\d{2}$',
]
name_cleanup  = []
parse_mode = "normal"

# ── METRO / ETRD GrosMarket ───────────────────────────────────────────────────
[store.metro]
name = "METRO / ETRD GrosMarket"
identifiers = [
    'METRO',
    'ETRD',
    'ETRDGROSMARET',
    'FETRO',
    'ETRO\s+GROS',
    'metro-tr',
]
y_tolerance   = 15
header_y_max  = 1500
footer_y_min  = 9999
price_pattern = '^[\*x×](-?[\d\.]+,\d{2}|-?[\d]+[\.,]\d{2})$'
total_pattern = '^(NET\s+TOPLAM)'
skip_patterns = [
    '^\d+[\.,]\d{2}$',
]
name_cleanup = [
    ['^[0-9]{8,}[A-Z]?', ''],
]
# Metro fişi: 1. satır ürün adı, 2. satırın sonu fiyat
parse_mode = "two_line"

# ── FSREF CAN GIDA ────────────────────────────────────────────────────────────
[store.fsref]
name = "FSREF CAN GIDA"
identifiers = [
    'FSREF',
    'CAN\s+GIDA',
]
y_tolerance   = 18
header_y_max  = 400
footer_y_min  = 9999
price_pattern = '^.*\*([\d\.]+,\d{2}|[\d]+[\.,]\d{2})$'
total_pattern = '^(TOPLAM|TOP|EFT-[PF]OS)'
skip_patterns = [
    '^\d+[\.,]\d{2}$',
]
name_cleanup = [
    ['^[=\-]+\s*', ''],
]
parse_mode = "normal"

# ── Buenas / Restoran ─────────────────────────────────────────────────────────
[store.buenas]
name = "BUENAS / RESTORAN"
identifiers = [
    'BUENAS',
]
y_tolerance   = 15
header_y_max  = 800
footer_y_min  = 9999
price_pattern = '^[\*x×](-?[\d\.]+,\d{2}|-?[\d]+[\.,]\d{2})$'
total_pattern = '^(NET\s+TOPLAM|ODENE|[ÖO]DENE|TOPLAM(?!\s+K[DO]V))'
skip_patterns = [
    '^\d+[\.,]\d{2}$',
]
name_cleanup = [
    ['^[0-9]{8,}[A-Z]?', ''],
]
parse_mode = "normal"

# ── KOVAN BAR / Restoran ──────────────────────────────────────────────────────
[store.kovan_bar]
name = "KOVAN BAR"
identifiers = [
    'KOVAN\s+BAR',
    'KOVAN BAR TURIZH',
]
y_tolerance   = 30
header_y_max  = 940
footer_y_min  = 9999
# Fiyatlar "%20*1.080,00" formatında — price_prefix_cleanup ile "%20" temizlenir, "*1.080,00" kalır
price_pattern = '^[\*x×](-?[\d]+\.[\d]+,\d{2}|-?[\d\.]+,\d{2}|-?[\d]+[\.,]\d{2}|-?[\d]{3,})$'
total_pattern = '^TOPLAM(?!\s*K[DO]V)'
skip_patterns = [
    '^[OT0]PK[DO][VU]',    # OPKDV / TOPKDV — KDV özet label
    '^\d+[\.,]\d{2}$',
]
name_cleanup = [
    ['^[A-Z]\s+', ''],      # baştaki tek harf + boşluk temizle ("I " gibi)
]
parse_mode = "normal"

# ── FULL OTO / Oto Servisi ────────────────────────────────────────────────────
[store.full_oto]
name = "FULL OTO"
identifiers = [
    'FULL\s+OTO',
    'FULL OTO OTOMOTIV',
]
y_tolerance   = 40    # isim ve fiyat 33-38px ayrık, geniş tolerans gerekli
header_y_max  = 700
footer_y_min  = 9999
# Fiyatlar: "*12,00" (yıldızlı) veya "460.00" (yıldızsız, OCR nokta hatası)
# dot_fixed dönüşümü "460.00" → "460,00" yapacak, pattern yakalar
price_pattern = '^[\*]?(\d{1,3}(?:[.,]\d{3})*[.,]\d{2})$'
total_pattern = '^TOPLAM(?!\s*K[DO]V)'
skip_patterns = [
    '^TOPKDV',
    '^FIS\s+NO',
    '^SAAT:',
    '^TESEKKUR',
    '^POS\s+NO',
    '^iSYERIN',
    '^iSLEM\s+NO',
    '^ONAY\s+K[O0]DU',
    '^TUTAR\s+KARSILIG',
    '^BUBELGEYI',
    '^BUISLEM',
    '^VakifBank',
    '^Z\s+NO',
    '^EKU\s+NO',
    '^AID\s*:',
    '^REF\s+NO',
    '^SATIS\s*$',
]
name_cleanup = [
    ['EGZ0Z', 'EGZOZ'],     # 0→O düzeltme
]
parse_mode = "normal"

# ── CafeGurup / Restoran ──────────────────────────────────────────────────────
[store.cafegurup]
name = "CAFEGURUP / Restoran"
identifiers = [
    'CAFEGURUP',
    'GASTRONOMI',
    'SANAYIVE\s+TİCARET',
    'GMU\s+[0-9So]',    # GMU POS yazılımı — OCR header kaçırdığında fallback
]
y_tolerance   = 18
header_y_max  = 400
footer_y_min  = 9999
price_pattern = '^[\*x×]?(\d{1,3}(?:[.,]\d{3})*[.,]\d{2}|\d+[.,]\d{2})\s*(?:TL)?$'
total_pattern = '^(TOPLAM(?!\s*K[DOUou]V)|GENEL\s+TOPLAM|OPLAM)'
skip_patterns = [
    '^[A-Z\s]+[İiI]\s*[Ss].*[Tt][iI]',
    '^\d+[\.,]\d{2}$',
]
name_cleanup = []
parse_mode = "normal"

# ── BAY DÖNER / Restoran ─────────────────────────────────────────────────────
[store.bavdoner]
name = "BAY DÖNER / Restoran"
identifiers = [
    'BAV?DONER',
    'BAYDONER',
    'BAYDöNER',
    'BAVDONER\s+RESTOR',
]
y_tolerance   = 20
header_y_max  = 900
footer_y_min  = 9999
price_pattern = '^\*(-?[\d]+\.[\d]+,\d{2}|-?[\d\.]+,\d{2}|-?[\d]+[\.,]\d{2}|-?[\d]{3,})$'
total_pattern = '^TOPLAM(?!\s*K[DO]V)'
skip_patterns = [
    '^\d+\s*[Aa]dt?\s*[Xx×]',   # "2Adt X" — adet × birim fiyat satırı (gerçek fiyat sonraki satırda)
    '^\d+[\.,]\d{2}$',
    '^KREDi?\s*$',
    '^TEB\s*$',
]
name_cleanup = [
    ['^[=\-]+\s*', ''],
    ['\s*%\d+\s*$', ''],
]
parse_mode = "normal"

# ── HARRAS / FILE Market ──────────────────────────────────────────────────────
[store.harras]
name = "HARRAS / Market"
identifiers = [
    'FILE\s+HERKET',
    'FILE\s+MARKET',
    'HARRAS',
    'FiLEKAZIM',
    'FILE\s+KAZIM',
]
y_tolerance   = 20
header_y_max  = 900
footer_y_min  = 9999
# Fiyatlar hem "." hem "," ondalık kullanıyor — her ikisini de yakala
price_pattern = '^\*(-?[\d]+\.[\d]+,\d{2}|-?[\d\.]+,\d{2}|-?[\d]+[\.,]\d{2}|-?[\d]{3,})$'
total_pattern = '^(Odenecek|TOPLAM(?!\s*K[DO]V))'
skip_patterns = [
    '\*GLUTENSIZ',              # *GLUTENSIZ URUN* label satırları
    '^TOPIRM',                  # OCR: "TOPLAM KDV" → "TOPIRM KDV"
    '^TOP[^K]\w*\s+KDV',       # "TOPLAM KDV" OCR varyantları (TOPIRM KDV vb.)
    '^\d+[\.,]\d{2}$',
]
name_cleanup = [
    ['^[=\-]+\s*', ''],
    ['\s*%\d+\.?\s*$', ''],    # trailing "%1." veya "%10" — HARRAS'ın KDV kodu eki
]
parse_mode = "normal"

# ── TK MARKET / Tarım Kredi ───────────────────────────────────────────────────
[store.tk_market]
name = "TK Market / Tarım Kredi"
identifiers = [
    'TK\s+TARIM\s+KRE[OD]I',
    'TKTARIM',
    'TARIM\s+KRE[OD]I\s+PAZ',
    'kooperatifmarket',
    'TK\s+TARIM\s+KRE[OD]',
]
y_tolerance   = 20
header_y_max  = 1100
footer_y_min  = 9999
# Ürün fiyatları yıldızlı; toplam yıldızsız ("1969.6", "26")
price_pattern = '^\*(-?[\d]+\.[\d]+,\d{2}|-?[\d\.]+,\d{2}|-?[\d]+[\.,]\d{2}|-?[\d]{3,})$'
total_pattern = '^Topla[rmnRMN]{1,2}\s*$|^TOPLAM\s*$'
# Toplam değeri yıldızsız — sayısal format: "1969.6", "26,00", "26" vb.
total_price_pattern = '^\*?(\d{1,3}(?:[.,]\d{3})*[.,]\d{2}|\d+[.,]\d{1,2}|\d{2,})$'
skip_patterns = [
    '^Toplam\s+K[DO]',          # "Toplam KDV" / "Toplam KOy" — KDV özeti
    '^Toplam\s+Ko',             # "Toplam Koy:" OCR varyantı
    '^\d+[\.,]\d{2}$',
]
name_cleanup = [
    ['^[=\-]+\s*', ''],
]
parse_mode = "normal"

# ── DENİZKENT KAFE / Restoran ─────────────────────────────────────────────────
[store.denizkent]
name = "DENİZKENT KAFE"
identifiers = [
    'DEN[İI]ZKENT\s+KAFE',
    'DENIZKENT',
    'KARSIYAKA\s+SOS\.TES',
    'YENI\s+KARSIYAKA\s+SOS',
    'KENT\s+KARSIYAKA\s+SOS',
]
y_tolerance   = 20
header_y_max  = 900
footer_y_min  = 9999
price_pattern = '^\*(-?[\d]+\.[\d]+,\d{2}|-?[\d\.]+,\d{2}|-?[\d]+[\.,]\d{2}|-?[\d]{3,})$'
total_pattern = '^TOPLAM(?!\s*K[DO]V)'
skip_patterns = [
    '^\d+[\.,]\d{2}$',
    '^KREDi?\s*$',
    '^\d+\s*[Xx×]\s*\w',       # "1 X CARLSBERG" — adet-prefix satırı (fiyat ayrı satırda)
]
name_cleanup = [
    ['^[=\-]+\s*', ''],
    ['\s*%\d+\s*$', ''],
    ['^\d+\s*[Xx×]\s*', ''],   # "1 X " öneki temizle
]
parse_mode = "normal"

# ── BİLİNMEYEN / Fallback ────────────────────────────────────────────────────
# Hiçbir market identifier'ına uymayan fişler için kullanılır.
# detect_store() asla bu profili seçmez — yalnızca fallback olarak atanır.
[store.bilinmeyen]
name = "BİLİNMEYEN MARKET"
identifiers = []
y_tolerance   = 20
header_y_max  = 900
footer_y_min  = 9999
price_pattern = '^[\*x×](-?[\d]+\.[\d]+,\d{2}|-?[\d\.]+,\d{2}|-?[\d]+[\.,]\d{2}|-?[\d]{3,})$'
total_pattern = '^TOPLAM|^EFT-[PF]OS'
skip_patterns = [
    '^KOV\s+Z',
    '^\d+[\.,]\d{2}$',
]
name_cleanup = [
    ['^[=\-]+\s*', ''],
    ['\s*(?:\d+%|%\d+)\s*$', ''],
]
parse_mode = "normal"
